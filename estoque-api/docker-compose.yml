version: "3.9"

services:
  api:
    build: .
    container_name: estoque-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: estoque
      DB_SSLMODE: disable
      JWT_SECRET: sua-chave-secreta-muito-segura-aqui
      PORT: 8080
      ENV: production
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: estoque-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: estoque
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../estoque-front
      dockerfile: Dockerfile
    container_name: estoque-front
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: estoque-adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
